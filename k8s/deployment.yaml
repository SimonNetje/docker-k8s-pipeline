apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-k8s-pipeline
  labels:
    app.kubernetes.io/name: docker-k8s-pipeline
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: docker-k8s-pipeline
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docker-k8s-pipeline
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: docker-k8s-pipeline
          image: docker.io/simonnetje/docker-k8s-pipeline:63d28558b382b95f90d22360b5866b986462bcaf
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
