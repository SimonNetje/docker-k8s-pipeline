name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - k8s/deployment.yaml

permissions:
  contents: write

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Kubernetes image tag
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          image="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}"
          sed -i -E "s#^([[:space:]]*image: ).+#\1${image}#" k8s/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml

          if git diff --cached --quiet; then
            echo "No Kubernetes manifest changes to commit."
            exit 0
          fi

          git commit -m "chore(gitops): update image tag to ${GITHUB_SHA}"
          git push
